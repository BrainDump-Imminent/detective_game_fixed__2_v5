const CASES={case_001:{id:"case_001",title:"海港餐厅投毒案",difficulty:"标准",briefing:"马库斯·黑尔，52岁，海港餐厅老板，晚上10点15分被清洁人员发现死在办公桌前。他身旁放着一杯喝了一半的威士忌。初步检查显示为中毒。两名相关人员同时具有作案动机和接近条件。",guilty:"A",sections:{"犯罪现场":{icon:"🔍",clues:[{id:"cs_1",text:"受害者趴倒在办公桌上，无打斗痕迹或强行闯入迹象"},{id:"cs_2",text:"半杯单一麦芽威士忌，杯底有微弱的油性残留物"},{id:"cs_3",text:"办公室保险箱开着——内容物看似未被动过"},{id:"cs_4",text:"玻璃杯附近弥漫着淡淡的甜味化学气味"},{id:"cs_5",text:"走廊安防摄像头已在配电箱处被物理断开"},{id:"cs_6",text:"受害者手机屏幕显示晚上8:47有一条拨出通话记录"}]},"法医分析":{icon:"🧪",clues:[{id:"fa_1",text:"毒理学报告：死因为乙二醇摄入——汽车防冻液的主要成分"},{id:"fa_2",text:"威士忌酒瓶上的指纹：受害者本人的以及一组未识别指纹（部分指纹，6点比对待定）"},{id:"fa_3",text:"办公室门把手上的纤维：深藏青色羊毛，与呢大衣或外套一致"},{id:"fa_4",text:"死亡时间估计在晚上9:00至10:00之间"},{id:"fa_5",text:"尸体上无防御性伤口或注射痕迹"}]},"证人证词":{icon:"👁️",clues:[{id:"ws_1",text:"送货司机：看到一名穿深色外套的高个男子约在晚上9:15从餐厅侧门离开"},{id:"ws_2",text:"邻居：约在晚上8:30听到餐厅办公区域传出争吵声"},{id:"ws_3",text:"主厨（晚上7点离开）：确认两名嫌疑人都有办公室钥匙"},{id:"ws_4",text:"调酒师：受害者只喝格兰菲迪18年；在办公室放着一瓶私人存酒"}]},"数字与财务":{icon:"📱",clues:[{id:"df_1",text:'受害者发给律师的邮件（3天前）："如果我出了什么事，去查合伙账目"'},{id:"df_2",text:'从嫌疑人设备恢复的浏览记录：搜索过"无法检测的毒物"和"乙二醇的味道"——两周前已清除'},{id:"df_3",text:"一份价值120万美元的关键人物保险于6周前办理，受益人为商业合伙人"},{id:"df_4",text:"受害者信用卡：4天前在锁匠处有消费记录——他在换锁吗？"},{id:"df_5",text:"系统日志显示安防摄像头于晚上8:20被断开"}]}},suspects:{A:{name:"马库斯·韦伯",relation:"商业合伙人",age:48,description:"海港餐厅共同所有人（50/50股权分配）。前汽车修理技师，8年前转入餐饮业。以暴躁脾气和近期关于餐厅财务方向的争执而闻名。",stats:[{icon:"💼",label:"共同所有人，50%股权"},{icon:"🔧",label:"前修理技师，10年"},{icon:"📍",label:"距案发地12分钟"}],detailSections:{"背景与职业":{icon:"📋",clues:[{id:"sa_1",text:"10年汽车维修背景——在经营餐厅之前开过自己的修车厂"},{id:"sa_2",text:"最近发现受害者正在与竞争对手洽谈出售其50%股份"}]},"通讯记录":{icon:"📞",clues:[{id:"sa_3",text:"通话记录确认他在晚上8:47准时致电受害者（通话时长2分14秒）"},{id:"sa_3b",text:"晚上9:30发送至未知号码的短信：\"搞定了。别再联系我。\""}]},"物证":{icon:"🧥",clues:[{id:"sa_4",text:'拥有一件深藏青色呢大衣——据员工说是他的"标志性穿搭"'},{id:"sa_4b",text:"自愿接受问询时注意到他夹克上有淡淡的化学气味——与溶剂或防冻液一致"}]},"门禁与钥匙":{icon:"🔑",clues:[{id:"sa_5",text:"拥有餐厅所有区域的钥匙，包括办公室和配电箱面板"},{id:"sa_5b",text:"员工确认他在谋杀案发生前一周多次未经通知到访餐厅"}]},"不在场证明":{icon:"🛡️",clues:[{id:"sa_6",text:"声称晚上7点后在家看电视——无人能证实 "颜料批次分析",text:"手套内的镉黄与《里昂黄昏》使用的特定颜料批次匹配——不是通用修复材料。手套佩戴者近期接触过这幅特定画作。",icon:"🎨",effect:"strengthens_B"}},{a:"cs2_6",b:"sb2_4",suspect:"B",category:"关键证据",deduction:"现场37码软底鞋印与沃斯的鞋码及她惯常穿的实验室鞋一致。阿什福德穿43码。",breakthrough:{title:"更衣室检查",text:"沃斯在员工储物柜里备有一双实验室鞋。盗窃案次日早晨，只剩一双——另一双未被找到。员工确认她通常备有两双。",icon:"👟",effect:"strengthens_B"}},{a:"cs2_3",b:"fa2_1",suspect:"B",category:"关键证据",deduction:"现场发现一只带有女性DNA的左手乳胶手套。沃斯是左撇子且为女性——手套很可能是她的，不小心掉落在展示台后方。",breakthrough:{title:"DNA交叉比对",text:"杰拉德·阿什福德三世的DNA因先前的民事纠纷已存档。实验室确认与手套样本不匹配。供体为女性——阿什福德可以排除为手套佩戴者。",icon:"🧬",effect:"weakens_A"}},{a:"df2_1",b:"df2_2",suspect:"B",category:"作案动机",deduction:"沃斯在加密硬盘上存有该画的高清扫描——正是海外买家所寻之画。她在准备中介交易，而非仅为修复存档。",breakthrough:{title:"中介通讯追踪",text:"暗网中介的加密日志提到一个联系人，被描述为具有'出处验证和画布鉴定专业知识'——这种措辞指向受过正规修复训练的人，而非画廊业主。",icon:"🌐",effect:"strengthens_B"}},{a:"ws2_3",b:"cs2_4",suspect:"B",category:"作案时机",deduction:"沃斯被确认至少在晚上11:30时仍在大楼内，且知道警报维护代码。她可能等到保安凌晨2:40休息时，绕过警报，在15分钟内完成盗窃。",breakthrough:{title:"暖通空调系统日志",text:"大楼气候记录显示修复实验室的湿度控制系统一直运行到凌晨3:15——房间空置30分钟后会自动关闭。有人在沃斯声称离开后很久仍在实验室里。",icon:"🌡️",effect:"strengthens_B"}}]},case_003:{id:"case_003",title:"贝尔蒙特庄园纵火案",difficulty:"标准",briefing:"维克托·贝尔蒙特，68岁，退休实业家，在凌晨约2:15一场吞噬其乡间庄园东翼的大火中丧生。消防调查人员确认使用了助燃剂——这是纵火，而非意外。庄园电子门禁日志显示当晚仅有两名访客。两人同时具有作案动机和机会。",guilty:"B",sections:{"犯罪现场":{icon:"🔍",clues:[{id:"cs3_1",text:"火灾起源于一楼书房——燃烧痕迹从书桌下方向外辐射"},{id:"cs3_2",text:"在距房屋30米的花园树篱中发现被丢弃的商用助燃剂容器残骸"},{id:"cs3_3",text:"庄园后方服务门被发现未锁——各处均无强行闯入痕迹"},{id:"cs3_4",text:"在起火点附近回收到一个部分熔化的数字定时器装置，连接着一个简易电子点火器"},{id:"cs3_5",text:"受害者的老花镜和一本翻开的书在书桌上被发现——火灾发生时他很可能正坐着"},{id:"cs3_6",text:"庄园的喷淋系统已在地下室配电面板处被手动禁用"}]},"法医分析":{icon:"🧪",clues:[{id:"fa3_1",text:"助燃剂鉴定为商用级煤油——主要在农业用品店销售，非普通零售渠道"},{id:"fa3_2",text:"定时器装置是一个改装的灌溉控制器——常用于庄园园林养护系统"},{id:"fa3_3",text:"死亡时间估计在凌晨2:00至2:30之间——死因是在烧伤到达受害者之前的烟雾吸入"},{id:"fa3_4",text:"助燃剂容器上无指纹——已用布擦拭干净，留有微量棉纤维"},{id:"fa3_5",text:"在发现容器的树篱附近软土中的靴印：39码，深齿纹工装靴花纹"}]},"证人证词":{icon:"👁️",clues:[{id:"ws3_1",text:"庄园园丁：注意到火灾前两天喷淋系统压力表读数为零——以为是故障"},{id:"ws3_2",text:"最近的邻居（800米外）：凌晨1:3 :"case_004",title:"子午线特快谋杀案",difficulty:"进阶",briefing:"亨利·阿什沃思，56岁，企业举报人，被发现死在维也纳至苏黎世夜班子午线特快列车的锁闭卧铺车厢内。死因：一把薄刃精准刺入的单一刺伤。车厢从内部上了门栓——但门上方的通风面板曾被拆卸并重新安装。列车上的两名人员与此案均有关联和作案机会。",guilty:"A",sections:{"犯罪现场":{icon:"🔍",clues:[{id:"cs4_1",text:"受害者被发现倒在铺位上，衣着完整——胸部左侧一处刺伤，刺穿心脏"},{id:"cs4_2",text:"车厢门从内部用链锁上栓——暗示凶手通过其他途径离开"},{id:"cs4_3",text:"车厢门上方的通风面板（40厘米×60厘米）曾被拧开并复位——螺纹上有新鲜工具痕迹"},{id:"cs4_4",text:"一把擦拭干净的薄钢裁纸刀被发现夹在座垫之间——与伤口尺寸一致"},{id:"cs4_5",text:"无打斗痕迹——受害者遇袭时似乎在睡觉或已被镇静"},{id:"cs4_6",text:"折叠桌上有半杯红酒，以及一包打开的安眠药（少了两粒）"}]},"法医分析":{icon:"🧪",clues:[{id:"fa4_1",text:"毒理学报告：受害者体内唑吡坦（安眠药）水平偏高——超出标准剂量，与被人在不知情的情况下额外给药一致"},{id:"fa4_2",text:"伤口由一把约12厘米长的窄双刃刀片造成——与回收的裁纸刀一致"},{id:"fa4_3",text:"通风面板螺丝上的细微划痕与多功能工具刀片匹配，而非标准螺丝刀"},{id:"fa4_4",text:"死亡时间估计在凌晨1:00至2:00之间——此时段列车在站点之间运行，未停靠"},{id:"fa4_5",text:"从通风面板框架内侧提取到一枚不完整指纹——不足以进行数据库比对，但足以用于对比"}]},"证人证词":{icon:"👁️",clues:[{id:"ws4_1",text:"餐车服务员：受害者与嫌疑人A在晚上8:30至10:00在餐车共进晚餐——他们看起来认识彼此"},{id:"ws4_2",text:"隔壁车厢乘客：凌晨1:15左右听到短暂的金属刮擦声，但以为是正常的列车噪音"},{id:"ws4_3",text:"夜班乘务员：确认凌晨12:30巡查时走廊空无一人——下次巡查要到凌晨3:00，正是发现尸体的时间"},{id:"ws4_4",text:"酒吧车服务员：嫌疑人A在晚上11:45点了两杯红酒并带回卧铺车方向——说第二杯是'给朋友的'"}]},"数字与财务":{icon:"📱",clues:[{id:"df4_1",text:"受害者原定在针对赫利俄斯金融集团的重大欺诈案中作证——证词安排在抵达苏黎世后两天"},{id:"df4_2",text:"嫌疑人A的手机定位数据显示他在凌晨12:50至1:25之间位于受害者车厢外的走廊中"},{id:"df4_3",text:"电汇记录：嫌疑人A在旅程前三周从与赫利俄斯金融集团关联的离岸空壳公司收到17.5万美元"},{id:"df4_4",text:"受害者的笔记本电脑从车厢中消失——其法律团队确认其中包含用于作证的关键证据文件"},{id:"df4_5",text:"嫌疑人A在出发前仅48小时购票——与受害者的行程表提交法院的同一天"}]}},suspects:{A:{name:"朱利安·克罗斯",relation:"同车乘客",age:45,description:"一名私人安全顾问，预订了与受害者同一卧铺车厢的舱位。此前受雇于赫利俄斯金融集团担任企业安全顾问。身材高大健壮，在安保圈以做事有条不紊著称。",stats:[{icon:"🛡️",label:"安全顾问"},{icon:"🏢",label:"前赫利俄斯员工"},{icon:"📍",label:"7B车厢，同一卧铺车"}],detailSections:{"背景与职业":{icon:"📋",clues:[{id:"sa4_1",text:"前军事情报官——接受过近距离作战和秘密潜入技术训练"},{id:"sa4_1b",text:"在18个月前转为自由职业之前，曾担任赫利俄斯金融集团企业安全主管四年"}]},"与受害者的关联":{icon:"🔗",clues:[{id:"sa4_2",text:"与受害者有职业往来——克罗斯担任安全主管期间，阿什沃思是赫利俄斯的高级分析师"},{id:"sa4_2b",text:"克罗斯在阿什沃思的举报投诉中被点名为'协助隐瞒财务违规行为'的人"}]},"物证":{icon:"🧤",clues:[{id:"sa4_3", 。受害者体内唑吡坦水平偏高——远超其自行服用的剂量。克罗斯在第二杯酒中下药以确保受害者深度昏迷。",breakthrough:{title:"酒杯残留物",text:"酒杯杯沿的微量分析显示唑吡坦残留浓度远高于受害者自身处方用量的预期值。该药物在递给他之前已被溶解在酒中。",icon:"🍷",effect:"strengthens_A"}},{a:"df4_5",b:"ws4_1",suspect:"A",category:"关键证据",deduction:"克罗斯在出发前仅48小时购票——与受害者行程提交法院的同一天。当晚他还与受害者共进晚餐，建立接触。这不是巧合——克罗斯跟踪阿什沃思上了火车。",breakthrough:{title:"订票IP追踪",text:"车票从一个地理定位到克罗斯伦敦办公室的IP地址购买。他此前没有去维也纳的旅行计划——此行完全是为了拦截受害者而安排。",icon:"💻",effect:"strengthens_A"}},{a:"cs4_2",b:"sa4_3b",suspect:"A",category:"作案时机",deduction:"车厢从内部上了门栓，意味着凶手从其他途径离开。克罗斯38厘米的肩宽使他能够穿过门上方40厘米的通风口——这条路线对肩更宽的乘务员来说不可能。",breakthrough:{title:"现场重建测试",text:"铁路警方进行了实体重建：克罗斯体型的人可以在15秒内穿过通风口。娜迪亚·沃尔科夫肩宽44厘米，无法通过。",icon:"📐",effect:"weakens_B"}},{a:"df4_4",b:"sa4_2b",suspect:"A",category:"作案动机",deduction:"包含关键证词证据的受害者笔记本电脑失踪。克罗斯在该举报投诉中被点名——他有确保阿什沃思及其证据都无法到达法庭的个人利害关系。",breakthrough:{title:"数字恢复",text:"数据取证从列车垃圾压缩机中回收到碎片：笔记本电脑硬盘碎片，被物理销毁。序列号碎片与受害者注册的设备匹配。",icon:"💽",effect:"strengthens_A"}}]},case_005:{id:"case_005",title:"银棘晚宴投毒案",difficulty:"专家",briefing:"玛格丽特·银棘，74岁，知名慈善家，在其年度慈善晚宴的香槟祝酒环节中倒下，一小时内身亡。初步毒理学检测显示为氰化物中毒，毒物通过她的香槟杯投放。超过200名宾客在场，但对服务流程的法医分析指向两名对她酒杯有直接、无人监督接触机会的人员。",guilty:"A",sections:{"犯罪现场":{icon:"🔍",clues:[{id:"cs5_1",text:"受害者在主桌祝酒时倒下——她的私人香槟杯摔碎在地板上"},{id:"cs5_2",text:"酒杯碎片内壁边缘有微弱残留物——后经确认为氰化钾"},{id:"cs5_3",text:"供应主桌的香槟瓶经检测无毒——毒物是直接被投入酒杯中，而非酒瓶"},{id:"cs5_4",text:"在活动厨房垃圾桶中发现一个小型玻璃药瓶，内有微量氰化物残留，用布餐巾包裹"},{id:"cs5_5",text:"监控录像显示主桌香槟托盘在送出前，在服务通道中无人看管约4分钟"},{id:"cs5_6",text:"受害者的私人酒杯底部刻有一个小小的'S'字母——下毒者必须知道哪个杯子是她的"}]},"法医分析":{icon:"🧪",clues:[{id:"fa5_1",text:"死因：急性氰化物中毒——氰化钾溶于香槟中，致死剂量估计为200-300毫克"},{id:"fa5_2",text:"在厨房垃圾桶中发现的玻璃药瓶：医药级别，无指纹——但瓶盖螺纹处夹有一根棉纤维"},{id:"fa5_3",text:"该棉纤维为独特的勃艮第红色埃及棉——与标准餐饮制服的白色涤纶混纺面料不符"},{id:"fa5_4",text:"死亡时间：晚上9:47——祝酒在9:45发起，说明毒物起效迅速且是在不久前投放的"},{id:"fa5_5",text:"氰化钾是管制物质——获取需要实验室渠道或非法采购途径"}]},"证人证词":{icon:"👁️",clues:[{id:"ws5_1",text:"首席侍者：主桌香槟托盘在厨房准备好后通过服务通道送出——仅有两名工作人员有权进入该通道"},{id:"ws5_2",text:"活动策划：确认受害者在晚宴上一直使用她的私人刻字酒杯——这在密切关联人员和常驻员工中众所周知"},{id:"ws5_3",text:"晚宴摄影师：在大约晚上9:38拍到嫌疑人A出现在服务通道中——距祝酒仅七分钟"},{id:"ws5_4",text:"调酒师：注意到嫌疑人B整晚表现紧张，反复查看手机并走出去打电话"}]},"数字与财务":{icon:"📱",clues:[{id:"df5_1",text:"玛格丽特两个月前提交的遗产计划，将嫌疑人A指定为执行人和1200万美元信托基金的主要受益人——取代了她的前任律师"},{id:"df5_2",text:"嫌疑人A的浏览记录（从云备份恢复）：6周前通过VPN搜索'氰化钾溶解度'和'毒理学中的氰化物检测'"},{id:"df5_3",text:"玛格丽特的个人日记（电子版），晚宴前3天的最后一条：'多米尼克一直很好，但新遗产计划总觉得哪里不对。我打算让罗伯特审查一下。'"},{id:"df5_4",text:"通话记录：嫌疑人A在晚宴前5周与新泽西州一家化学品供应公司通话12分钟"},{id:"df5_5",text:"门禁徽章数据：嫌疑人A的通行证在晚上9:36在服务通道入口刷卡，9:42在宴会厅入口再次刷卡"}]}},suspects:{A:{name:"多米尼克·黑尔",relation:"私人律师",age:50,description:"过去三年担任玛格丽特的私人律师。起草了她最新的遗产计划，并被指定为执行人和主要受益人。风度翩翩，在慈善圈人脉广泛，每次活动必到。以穿定制西装著称。",stats:[{icon:"⚖️",label:"私人律师，3年"},{icon:"📜",label:"遗产执行人"},{icon:"👔",label:"定制勃艮第红西装"}],detailSections:{"背景与职务":{icon:"📋",clues:[{id:"sa5_1",text:"持证律师，专攻遗产规划——在玛格丽特的前任律师三年前退休后成为她的私人律师"},{id:"sa5_1b",text:"逐步掌控了玛格丽特的法律和财务事务，成为她最信任的顾问"}]},"遗产与受益人身份":{icon:"💰",clues:[{id:"sa5_2",text:"在最新遗产计划中被指定为执行人和主要受益人——将继承约1200万美元"},{id:"sa5_2b",text:"玛格丽特之前的遗产计划将一切留给她的慈善基金会——变更为黑尔受益仅在两个月前"}]},"出入与接触":{icon:"📍",clues:[{id:"sa5_3",text:"他的门禁徽章在晚上9:36在服务通道入口刷卡——他在香槟托盘暂放的通道中"},{id:"sa5_3b",text:"晚上9:42从服务通道进入宴会厅——他有六分钟无人监控的时间接触托盘"}]},"物证":{icon:"🧥",clues:[{id:"sa5_4",text:"晚宴当晚穿着勃艮第红色定制西装外套——埃及棉衬里，量身定制"},{id:"sa5_4b",text:"事后问询时注意到他外套袖口有一根松线——袖口边缘似乎刚被刮到"}]},"不在场证明":{icon:"🛡️",clues:[{id:"sa5_5",text:"声称他经过服务通道是为了抄近路赶到宴会厅参加祝酒——说他没有碰过托盘"},{id:"sa5_5b",text:"无目击者在服务通道中看到他——通道内无摄像头，仅在出入口有徽章刷卡记录"}]}}},B:{name:"艾丽丝·田中",relation:"私人主厨",age:36,description:"玛格丽特的私人主厨，服务七年，负责所有银棘家族活动的菜单规划和厨房管理。毕业于蓝带国际学院，对玛格丽特极为忠诚。负责本次晚宴的厨房和服务后勤。",stats:[{icon:"👩‍🍳",label:"私人主厨，7年"},{icon:"🎓",label:"蓝带学院毕业"},{icon:"📍",label:"厨房管理"}],detailSections:{"背景与忠诚":{icon:"📋",clues:[{id:"sb5_1",text:"为玛格丽特工作七年——员工们频繁形容她对雇主'极其忠诚和保护'"},{id:"sb5_1b",text:"玛格丽特的日记中多次赞扬艾丽丝的奉献：'艾丽丝是家人，不是员工'"}]},"厨房出入":{icon:"🍽️",clues:[{id:"sb5_2",text:"负责晚宴的整个厨房运营——有权接触所有食品和饮料准备区域"},{id:"sb5_2b",text:"香槟准备期间在厨房中，但当托盘被移至通道时她正在协调甜点服务"}]},"动机调查":{icon:"🔍",clues:[{id:"sb5_3",text:"无财务动机——她未出现在任何版本的玛格丽特遗产计划中，也无债务"},{id:"sb5_3b",text:"她当晚的电话是打给姐姐的——记录确认是与晚宴无关的家庭事务"}]},"行为与不在场证明":{icon:"🛡️",clues:[{id:"sb5_4",text:"三名厨房员工确认艾丽丝从晚上9:30到9:48一直在主厨房监督甜点摆盘"},{id:"sb5_4b",text:"她在活动中的紧张表现源于当天早些时候姐姐住院——医院记录证实"}]}}}},goldenPairs:[{a:"cs5_5",b:"sa5_3",suspect:"A",category:"作案时机",deduction:"香槟托盘在服务通道中无人看管四分钟。多米尼克·黑尔的徽章记录显示他在晚上9:36至9:42期间在该通道中——他在关键时间窗口内独自接触了托盘。",breakthrough:{title:"通道通行分析",text:"徽章记录显示，晚上9:33至9:44之间无其他人员进入服务通道。黑尔是唯一在那四分钟窗口内接触香槟托盘的人。",icon:"🚪",effect:"strengthens_A"}},{a:"fa5_3",b:"sa5_4",suspect:"A",category:"关键证据",deduction:"在氰化物药瓶上发现的勃艮第红色埃及棉纤维与黑尔定制西装外套的独特衬里匹配。该纤维是他处理药瓶时留下的——他的服装留下了法医痕迹。",breakthrough:{title:"纺织品鉴定报告",text:"该纤维的染色批次与黑尔西装衬里匹配——经其裁缝记录确认。这种特定的埃及棉混纺面料去年该裁缝仅制作了十二件成衣。",icon:"🔬",effect:"strengthens_A"}},{a:"df5_1",b:"df5_3",suspect:"A",category:"作案动机",deduction:"黑尔在新遗产计划下将继承1200万美元——但玛格丽特对此产生了疑虑，并计划请另一位律师审查。如果她把计划改回去，黑尔将一无所获。",breakthrough:{title:"律师联络记录",text:"玛格丽特的手机显示她在晚宴前一天致电了前任律师罗伯特·陈。陈确认她请他'看看多米尼克准备的东西——我想听听第二意见'。审查原定安排在晚宴后一周。",icon:"📞",effect:"strengthens_A"}},{a:"df5_2",b:"fa5_5",suspect:"A",category:"作案手段",deduction:"黑尔在晚宴六周前搜索了氰化物溶解度和检测方法，而氰化钾是需要特殊采购渠道的管制物质。他的搜索记录显示他既研究了如何使用它，也研究了如何避免被发现。",breakthrough:{title:"化学品供应商记录",text:"新泽西化学品公司确认了一笔以科研豁免名义下的氰化钾订单——豁免函使用了一个大学实验室的凭证。传真来源号码追溯到黑尔的办公室。",icon:"🧪",effect:"strengthens_A"}},{a:"cs5_6",b:"ws5_2",suspect:"A",category:"作案时机",deduction:"毒物被放入了玛格丽特特定的刻字酒杯——而非随机杯子。她使用私人酒杯的习惯在黑尔等密切关联人员中众所周知，这意味着下毒者事先知道哪个杯子是她的。",breakthrough:{title:"座位安排表权限",text:"显示主桌杯子摆放位置的座位安排表仅发送给活动策划和多米尼克·黑尔，黑尔坚持要亲自审查桌面布置。艾丽丝·田中不在发送名单上。",icon:"📋",effect:"weakens_B"}},{a:"df5_4",b:"cs5_4",suspect:"A",category:"作案手段",deduction:"黑尔在晚宴五周前致电了一家化学品供应公司。一个含有氰化物残留的医药级药瓶在厨房垃圾桶中被发现。他采购了毒物并用专业级容器带到了活动现场。",breakthrough:{title:"药瓶制造商追踪",text:"药瓶的批次号对应发往黑尔所联系的同一新泽西供应商的一批货物。该批次仅分销了200支——全部发往持证机构和一笔与黑尔欺诈性购买匹配的'科研订单'。",icon:"🏭",effect:"strengthens_A"}},{a:"ws5_3",b:"df5_5",suspect:"A",category:"关键证据",deduction:"摄影师在晚上9:38拍到黑尔出现在服务通道中，徽章数据确认他在9:36至9:42期间在场。他在无人看管的香槟托盘暂放点——就在致命祝酒的几分钟前。",breakthrough:{title:"照片增强分析",text:"对摄影师图像的数字增强显示黑尔站在香槟服务推车旁，右手向托盘方向伸出。图像时间戳与徽章记录精确吻合。",icon:"📸",effect:"strengthens_A"}}]}},SPRITE_W=32,S
